<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Sílabos - FINESI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f4f8; }
    header { background: #1a237e; color: white; padding: 24px; text-align: center; }
    header h1 { font-size: 1.8rem; }
    header p { margin-top: 6px; opacity: 0.8; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; padding: 30px; max-width: 1200px; margin: auto; }
    .card { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; }
    .card-header { background: #283593; color: white; padding: 14px 18px; font-weight: bold; }
    .card iframe { width: 100%; height: 420px; border: none; display: block; }
    .card-footer { padding: 10px 18px; background: #f5f5f5; text-align: right; }
    .card-footer a { color: #1a237e; font-size: 0.85rem; text-decoration: none; font-weight: bold; }
  </style>
</head>
<body>
<header>
  <h1>📚 Mis Sílabos — FINESI GITCS 2026</h1>
  <p>Cursos del semestre</p>
</header>
<div class="grid">

  <div class="card">
    <div class="card-header">Aprendizaje No Supervisado</div>
    <iframe src="finesi/gitcs2026/aprendizaje no supervisado.pdf"></iframe>
    <div class="card-footer"><a href="finesi/gitcs2026/aprendizaje no supervisado.pdf" target="_blank">Abrir ↗</a></div>
  </div>

  <div class="card">
    <div class="card-header">Arquitectura de Redes y Protocolos</div>

  </div>

  <div class="card">
    <div class="card-header">Gestión de Proyectos TICS</div>
    <iframe src="finesi/gitcs2026/gestión de proyectos tics.pdf"></iframe>
    <div class="card-footer"><a href="finesi/gitcs2026/gestión de proyectos tics.pdf" target="_blank">Abrir ↗</a></div>
  </div>

  <div class="card">
    <div class="card-header">Modelos Lineales</div>
    <iframe src="finesi/gitcs2026/modelos lineales.pdf"></iframe>
    <div class="card-footer"><a href="finesi/gitcs2026/modelos lineales.pdf" target="_blank">Abrir ↗</a></div>
  </div>

  <div class="card">
    <div class="card-header">Regresión Lineal</div>

  <div class="card">

    <div class="card-footer"><a href="finesi/gitcs2026/series de tiempo.pdf" target="_blank">Abrir ↗</a></div>
  </div>

</div>
</body>
</html>
